global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: unbound
    static_configs:
      - targets: ["172.30.0.20:9167", "172.30.0.21:9167"]

  - job_name: bind
    static_configs:
      - targets: ["172.30.0.13:9119", "172.30.0.14:9119"]