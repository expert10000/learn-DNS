version: "3.9"

name: dns-security-lab

services:
  authoritative_parent:
    image: internetsystemsconsortium/bind9:9.18
    container_name: dns_authoritative_parent
    restart: unless-stopped
    networks:
      dns_core:
        ipv4_address: 172.31.0.10
    volumes:
      - ./bind9_parent/named.conf:/etc/bind/named.conf:ro
      - ./bind9_parent/zones:/etc/bind/zones
      - ./bind9_parent/keys:/etc/bind/keys
      - ./bind9_parent/log:/var/log/bind
    # No published ports: reachable only inside Docker networks.

  authoritative_child:
    build:
      context: ./bind9
      dockerfile: Dockerfile
    container_name: dns_authoritative_child
    restart: unless-stopped
    networks:
      dns_core:
        ipv4_address: 172.31.0.11
    volumes:
      - ./bind9/named.conf:/etc/bind/named.conf:ro
      - ./bind9/zones:/etc/bind/zones
      - ./bind9/keys:/etc/bind/keys
      - ./bind9/log:/var/log/bind
      - ./captures:/captures
    # No published ports: reachable only inside Docker networks.

  resolver:
    build:
      context: ./unbound
      dockerfile: Dockerfile
    container_name: dns_resolver
    restart: unless-stopped
    depends_on:
      - authoritative_parent
      - authoritative_child
    networks:
      dns_core:
        ipv4_address: 172.31.0.20
      client_net:
        ipv4_address: 172.32.0.20
      untrusted_net:
        ipv4_address: 172.33.0.20
      mgmt_net:
        ipv4_address: 172.30.0.20
    volumes:
      - ./unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf:ro
      - ./unbound/root.hints:/opt/unbound/etc/unbound/root.hints:ro
      - ./unbound/start.sh:/opt/unbound/etc/unbound/start.sh:ro
      - ./anchors:/opt/unbound/etc/unbound/anchors
      - ./unbound/tls:/opt/unbound/etc/unbound/tls
      - ./unbound/log:/var/log/unbound
      - ./captures:/captures
    command: ["sh", "/opt/unbound/etc/unbound/start.sh"]
    # Optional: expose ONLY to localhost on the VM (host-side dig via tunnel)
    ports:
      - "127.0.0.1:5300:53/udp"
      - "127.0.0.1:5300:53/tcp"

  resolver_plain:
    build:
      context: ./unbound
      dockerfile: Dockerfile
    container_name: dns_resolver_plain
    restart: unless-stopped
    depends_on:
      - authoritative_parent
      - authoritative_child
    networks:
      dns_core:
        ipv4_address: 172.31.0.21
      client_net:
        ipv4_address: 172.32.0.21
      untrusted_net:
        ipv4_address: 172.33.0.21
      mgmt_net:
        ipv4_address: 172.30.0.21
    volumes:
      - ./unbound/unbound.plain.conf:/opt/unbound/etc/unbound/unbound.conf:ro
      - ./unbound/root.hints:/opt/unbound/etc/unbound/root.hints:ro
      - ./unbound/start_plain.sh:/opt/unbound/etc/unbound/start.sh:ro
      - ./unbound/tls:/opt/unbound/etc/unbound/tls
      - ./unbound/log_plain:/var/log/unbound
    command: ["sh", "/opt/unbound/etc/unbound/start.sh"]
    ports:
      - "127.0.0.1:5301:53/udp"
      - "127.0.0.1:5301:53/tcp"

  dot_proxy:
    build:
      context: ./dot_proxy
    container_name: dns_dot_proxy
    restart: unless-stopped
    environment:
      - UPSTREAM_HOST=172.30.0.20
      - UPSTREAM_PORT=53
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.81
    volumes:
      - ./dot_proxy/certs:/certs
    ports:
      - "127.0.0.1:853:853/tcp"

  doh_proxy:
    build:
      context: ./doh_proxy
    container_name: dns_doh_proxy
    restart: unless-stopped
    environment:
      - UPSTREAM_DNS=172.30.0.20
      - UPSTREAM_PORT=53
      - UPSTREAM_TIMEOUT=2.0
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.80
    volumes:
      - ./doh_proxy/certs:/certs
    ports:
      - "127.0.0.1:8443:443"

  client:
    build:
      context: ./client_api
    container_name: dns_client
    environment:
      - PROFILE=trusted
      - DEFAULT_DNS_SERVER=172.32.0.20
      - CLIENT_API_KEY=change_me_long_random_client
      - CLIENT_RATE_LIMIT_PER_MIN=120
    networks:
      client_net:
        ipv4_address: 172.32.0.50

  untrusted:
    build:
      context: ./client_api
    container_name: dns_untrusted
    environment:
      - PROFILE=untrusted
      - DEFAULT_DNS_SERVER=172.33.0.20
      - CLIENT_API_KEY=change_me_long_random_client
      - CLIENT_RATE_LIMIT_PER_MIN=120
    networks:
      untrusted_net:
        ipv4_address: 172.33.0.50

  mgmt_client:
    build:
      context: ./client_api
    container_name: dns_mgmt_client
    environment:
      - PROFILE=mgmt
      - DEFAULT_DNS_SERVER=172.30.0.20
      - CLIENT_API_KEY=change_me_long_random_client
      - CLIENT_RATE_LIMIT_PER_MIN=120
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.50

  toolbox:
    image: nicolaka/netshoot:latest
    container_name: dns_toolbox
    command: ["sh", "-lc", "sleep infinity"]
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.60
      client_net:
        ipv4_address: 172.32.0.60
      dns_core:
        ipv4_address: 172.31.0.60
      untrusted_net:
        ipv4_address: 172.33.0.60

  perf_tools:
    build:
      context: ./perf_tools
    container_name: dns_perf_tools
    command: ["sh", "-lc", "sleep infinity"]
    networks:
      client_net:
      dns_core:
    volumes:
      - ./:/work

  # -------------------------
  # Option 1: Portainer (GUI exec/logs)
  # -------------------------
  portainer:
    image: portainer/portainer-ce:latest
    container_name: dns_portainer
    restart: unless-stopped
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.10
      public_net:
        ipv4_address: 172.34.0.10
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    # Exposed to host (Win11). Use firewall rules if needed.
    ports:
      - "9443:9443"
      - "9000:9000"

  # -------------------------
  # Option 2: ONE management API for React (logs + optional dig)
  # Optional: logs/management endpoints. React uses per-client APIs by default.
  # -------------------------
  lab_api:
    build: ./lab_api
    container_name: dns_lab_api
    restart: unless-stopped
    environment:
      - LAB_API_KEY=change_me_long_random
      - LAB_API_ALLOW_DOCKER=1
      - LAB_API_RATE_LIMIT_PER_MIN=120
      - LAB_API_RATE_LIMIT_WINDOW_S=60
      - LAB_API_AUDIT_LOG=/var/log/lab_api/audit.log
      - AUTH_AGENT_URL=http://dns_agent_authoritative:8081
      - RESOLVER_AGENT_URL=http://dns_agent_resolver:8081
      - AGENT_API_KEY=change_me_agent
      - CAPTURE_RESOLVER_CONTAINER=dns_resolver
      - CAPTURE_AUTHORITATIVE_CONTAINER=dns_authoritative_child
      - AUTH_CHILD_IP=172.31.0.11
      - RESOLVER_CORE_IP=172.31.0.20
      - DOT_RESOLVER_IP=172.30.0.81
      - DOT_RESOLVER_PORT=853
      - DOH_PROXY_HOST=172.30.0.80
      - DOH_PROXY_PORT=443
      - DOH_PROXY_PATH=/dns-query
      - PERF_TOOLS_CONTAINER=dns_perf_tools
    networks:
      client_net:
        ipv4_address: 172.32.0.90
      untrusted_net:
        ipv4_address: 172.33.0.90
      mgmt_net:
        ipv4_address: 172.30.0.90
      public_net:
        ipv4_address: 172.34.0.90
    # Bind ONLY to localhost of the VM
    ports:
      - "127.0.0.1:8000:8000"
    # Optional: allow API to show logs via HTTP (read-only)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./bind9/log:/logs/bind:ro
      - ./unbound/log:/logs/unbound:ro
      - ./bind9:/config/bind:rw
      - ./bind9_parent:/config/bind_parent:rw
      - ./unbound/unbound.conf:/config/unbound/unbound.conf:rw
      - ./unbound/unbound.plain.conf:/config/unbound/unbound.plain.conf:rw
      - ./unbound/root.hints:/config/unbound/root.hints:ro
      - ./anchors:/config/unbound/anchors:ro
      - ./captures:/captures
      - ./lab_api/log:/var/log/lab_api

  agent_authoritative:
    build: ./agent_api
    container_name: dns_agent_authoritative
    restart: unless-stopped
    environment:
      - AGENT_ROLE=authoritative
      - AGENT_API_KEY=change_me_agent
      - AGENT_LOG_DIRS=bind=/logs/bind,bind_parent=/logs/bind_parent
      - AGENT_CONFIG_ROOTS=bind=/config/bind,bind_parent=/config/bind_parent
      - AGENT_STATUS_TARGETS=authoritative_parent=172.31.0.10:53,authoritative_child=172.31.0.11:53
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.91
      dns_core:
        ipv4_address: 172.31.0.91
    volumes:
      - ./bind9/named.conf:/config/bind/named.conf:ro
      - ./bind9/zones:/config/bind/zones:ro
      - ./bind9/keys:/config/bind/keys:ro
      - ./bind9/log:/logs/bind:ro
      - ./bind9_parent/named.conf:/config/bind_parent/named.conf:ro
      - ./bind9_parent/zones:/config/bind_parent/zones:ro
      - ./bind9_parent/keys:/config/bind_parent/keys:ro
      - ./bind9_parent/log:/logs/bind_parent:ro

  agent_resolver:
    build: ./agent_api
    container_name: dns_agent_resolver
    restart: unless-stopped
    environment:
      - AGENT_ROLE=resolver
      - AGENT_API_KEY=change_me_agent
      - AGENT_LOG_DIRS=unbound=/logs/unbound,unbound_plain=/logs/unbound_plain
      - AGENT_CONFIG_ROOTS=unbound=/config/unbound
      - AGENT_STATUS_TARGETS=resolver=172.31.0.20:53,resolver_plain=172.31.0.21:53
    networks:
      mgmt_net:
        ipv4_address: 172.30.0.92
      dns_core:
        ipv4_address: 172.31.0.92
    volumes:
      - ./unbound/unbound.conf:/config/unbound/unbound.conf:ro
      - ./unbound/unbound.plain.conf:/config/unbound/unbound.plain.conf:ro
      - ./unbound/root.hints:/config/unbound/root.hints:ro
      - ./unbound/log:/logs/unbound:ro
      - ./unbound/log_plain:/logs/unbound_plain:ro

  capture_resolver:
    image: nicolaka/netshoot:latest
    container_name: dns_capture_resolver
    command: ["sh", "-lc", "sleep infinity"]
    network_mode: "service:resolver"
    depends_on:
      - resolver
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures

  capture_authoritative:
    image: nicolaka/netshoot:latest
    container_name: dns_capture_authoritative
    command: ["sh", "-lc", "sleep infinity"]
    network_mode: "service:authoritative_child"
    depends_on:
      - authoritative_child
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./captures:/captures

  anchor_export:
    image: alpine:3.20
    container_name: dns_anchor_export
    depends_on:
      - authoritative_parent
    command:
      - sh
      - -lc
      - >
        set -e;
        echo "Waiting for test. KSK...";
        while true; do
          best_state="";
          best_active=0;
          for s in /bind9_parent/keys/Ktest.+013+*.state; do
            [ -f "$$s" ] || continue;
            ksk="$$(awk -F': ' '/^KSK:/{print $$2}' "$$s")";
            goal="$$(awk -F': ' '/^GoalState:/{print $$2}' "$$s")";
            active="$$(awk '/^Active:/{print $$2}' "$$s")";
            if [ "$$ksk" = "yes" ] && [ "$$goal" = "omnipresent" ] && [ -n "$$active" ]; then
              if [ "$$active" -gt "$$best_active" ]; then
                best_active="$$active";
                best_state="$$s";
              fi;
            fi;
          done;
          if [ -z "$$best_state" ]; then
            best_state="$$(ls /bind9_parent/keys/Ktest.+013+*.state 2>/dev/null | head -n1 || true)";
          fi;
          if [ -n "$$best_state" ]; then
            f="$${best_state%.state}.key";
          else
            f="$$(ls -t /bind9_parent/keys/Ktest.+013+*.key 2>/dev/null | head -n1 || true)";
            if [ -n "$$f" ] && ! grep -q ' DNSKEY 257 ' "$$f"; then
              f="$$(grep -l ' DNSKEY 257 ' /bind9_parent/keys/Ktest.+013+*.key 2>/dev/null | head -n1 || true)";
            fi;
          fi;
          if [ -n "$$f" ] && [ -f "$$f" ]; then
            line="$$(grep -m1 ' DNSKEY 257 ' "$$f" || true)";
            if [ -n "$$line" ]; then
              echo "$$line" | awk '{
                name=$$1; type=$$4;
                flags=$$5; proto=$$6; alg=$$7;
                key=""; for (i=8; i<=NF; i++) key=key $$i;
                print name, type, flags, proto, alg, key
              }' > /anchors/test.key;
              echo "Wrote /anchors/test.key from $$f";
              break;
            fi;
          fi;
          sleep 1;
        done
    volumes:
      - ./bind9_parent/keys:/bind9_parent/keys:ro
      - ./anchors:/anchors

  ds_recompute:
    image: python:3.12-alpine
    container_name: dns_ds_recompute
    depends_on:
      - authoritative_child
    working_dir: /work
    command:
      - sh
      - -lc
      - >
        apk add --no-cache docker-cli >/dev/null 2>&1 || true;
        python scripts/recompute_ds.py --wait 120 --exit-code-on-change;
        rc=$$?;
        if [ $$rc -eq 10 ]; then
          docker restart dns_authoritative_parent;
          rc=0;
        fi;
        exit $$rc
    volumes:
      - ./:/work
      - /var/run/docker.sock:/var/run/docker.sock

  signing_switcher:
    image: internetsystemsconsortium/bind9:9.18
    container_name: dns_signing_switcher
    restart: unless-stopped
    entrypoint: ["sh", "-lc", "sleep 315360000"]
    volumes:
      - ./scripts:/switcher:ro
      - ./bind9:/bind9
      - ./bind9_parent:/bind9_parent

  signer:
    image: internetsystemsconsortium/bind9:9.18
    container_name: dns_signer
    working_dir: /tmp
    entrypoint: ["sh", "-lc"]
    command: "/signer/sign_zones.sh"
    volumes:
      - ./scripts:/signer:ro
      - ./bind9_parent/zones:/bind9_parent/zones
      - ./bind9_parent/keys:/bind9_parent/keys
      - ./bind9/zones:/bind9/zones
      - ./bind9/keys:/bind9/keys

  react_ui:
    build:
      context: ./react-ui
      args:
        VITE_API_BASE: "/api"
        VITE_LAB_API_BASE: "/lab-api"
        VITE_LAB_API_KEY: "change_me_long_random"
        VITE_CLIENT_API_KEY: "change_me_long_random_client"
    container_name: dns_react_ui
    restart: unless-stopped
    networks:
      public_net:
        ipv4_address: 172.34.0.50
      mgmt_net:
        ipv4_address: 172.30.0.70
      client_net:
        ipv4_address: 172.32.0.70
      untrusted_net:
        ipv4_address: 172.33.0.70
    ports:
      - "5173:80"

volumes:
  portainer_data:

networks:
  mgmt_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  dns_core:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.31.0.0/24

  client_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.32.0.0/24

  untrusted_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.33.0.0/24

  public_net:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.34.0.0/24
